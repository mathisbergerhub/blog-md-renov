<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Gérer les contenus | Blog MD Rénov'</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet" />
  <style>
    :root{--cream:#f0ece4;--paper:#fffaf3;--ink:#171717;--muted:#69635c;--red:#9b1c1c;--green:#174f31;--line:#ded6ca}*{box-sizing:border-box}body{margin:0;background:var(--cream);color:var(--ink);font-family:Lexend,system-ui,sans-serif}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 48px}header{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:28px}.brand img{width:168px;height:auto;display:block}.nav{display:flex;flex-wrap:wrap;gap:10px}.nav a,button,.open{min-height:42px;border:0;border-radius:999px;padding:0 16px;font:800 13px Lexend,sans-serif;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.nav a{border:1px solid var(--line);background:#fff;color:var(--ink)}.hero{border:1px solid var(--line);border-radius:28px;background:rgba(255,250,243,.88);padding:clamp(24px,4vw,44px);box-shadow:0 20px 60px rgba(23,23,23,.08);margin-bottom:22px}.eyebrow{color:var(--red);font-size:13px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}h1{margin:12px 0 14px;max-width:880px;font-size:clamp(40px,6vw,76px);line-height:.96;letter-spacing:-.07em}h1 em{color:var(--red);font-family:"Playfair Display",serif;font-style:italic;letter-spacing:-.04em}p{margin:0;color:var(--muted);line-height:1.65}.toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin:0 0 16px}.filters{display:flex;flex-wrap:wrap;gap:8px}.filters button,.refresh{background:#fff;color:var(--ink);border:1px solid var(--line)}.filters button.is-active{background:var(--ink);color:#fff;border-color:var(--ink)}.refresh{background:var(--red);color:#fff;border-color:var(--red)}.status{color:var(--muted);font-size:14px;font-weight:700}.list{display:grid;gap:12px}.item{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:18px;align-items:center;border:1px solid var(--line);border-radius:20px;background:#fff;padding:18px}.item h2{margin:0 0 8px;font-size:20px;line-height:1.25}.meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px;font-weight:700}.meta span{border:1px solid var(--line);border-radius:999px;background:var(--cream);padding:6px 10px}.actions{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}.archive{background:var(--green);color:#fff}.delete{background:var(--red);color:#fff}.open{background:#171715;color:#fff}.empty{border:1px dashed var(--line);border-radius:18px;padding:18px;background:rgba(255,255,255,.58);color:var(--muted);font-weight:700}.error{color:var(--red)}@media(max-width:760px){.item{grid-template-columns:1fr}header{flex-direction:column;align-items:flex-start}.actions{justify-content:flex-start}}
  </style>
</head>
<body>
  <div class="shell">
    <header><a class="brand" href="./"><img src="../logo-mdr-site.svg" alt="MD Rénov'" /></a><nav class="nav" aria-label="Navigation admin"><a href="./">Articles Decap</a><a href="./brief.html">Brief article</a><a href="../">Voir le blog</a></nav></header>
    <section class="hero"><div class="eyebrow">Gestion éditoriale</div><h1>Archiver ou supprimer un <em>contenu</em>.</h1><p>Archive un article quand tu veux le retirer du blog sans le perdre. Supprime uniquement si tu es sûr de ne plus vouloir garder le fichier.</p></section>
    <div class="toolbar"><div class="filters" aria-label="Filtres"><button type="button" class="is-active" data-filter="all">Tous</button><button type="button" data-filter="articles">Articles</button><button type="button" data-filter="briefs">Briefs</button></div><button type="button" class="refresh" id="refresh">Actualiser</button></div>
    <p id="status" class="status">Chargement des contenus...</p><div id="list" class="list"></div>
  </div>
  <script>
    const list=document.querySelector('#list'),status=document.querySelector('#status'),refresh=document.querySelector('#refresh'),filters=[...document.querySelectorAll('[data-filter]')];let items=[],activeFilter='all';
    function escapeHtml(value){return String(value||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}
    function render(){const visible=activeFilter==='all'?items:items.filter((item)=>(item.group||item.collection)===activeFilter);if(!visible.length){list.innerHTML='<div class="empty">Aucun contenu dans ce filtre.</div>';return}list.innerHTML=visible.map((item)=>`<article class="item"><div><h2>${escapeHtml(item.title)}</h2><div class="meta"><span>${escapeHtml(item.typeLabel)}</span><span>${escapeHtml(item.category||'sans catégorie')}</span><span>${escapeHtml(item.status||'sans statut')}</span><span>${escapeHtml(item.filePath)}</span></div></div><div class="actions"><a class="open" href="${escapeHtml(item.githubUrl)}" target="_blank" rel="noreferrer">Ouvrir</a><button class="archive" type="button" data-action="archive" data-collection="${escapeHtml(item.collection)}" data-path="${escapeHtml(item.filePath)}">Archiver</button><button class="delete" type="button" data-action="delete" data-collection="${escapeHtml(item.collection)}" data-path="${escapeHtml(item.filePath)}">Supprimer</button></div></article>`).join('')}
    async function loadItems(){status.textContent='Chargement des contenus...';status.classList.remove('error');try{const response=await fetch('/api/manage-content');const data=await response.json();if(!response.ok)throw new Error(data.error||'Impossible de charger les contenus.');items=data.items||[];status.textContent=`${items.length} contenu(s) actif(s).`;render()}catch(error){status.textContent=error.message;status.classList.add('error');list.innerHTML=''}}
    async function runAction(button){const action=button.dataset.action,collection=button.dataset.collection,filePath=button.dataset.path,verb=action==='archive'?'archiver':'supprimer',confirmText=action==='delete'?'SUPPRIMER':'ARCHIVER',answer=window.prompt(`Pour ${verb} ce contenu, écris ${confirmText}.`);if(answer!==confirmText)return;button.disabled=true;status.textContent=action==='archive'?'Archivage en cours...':'Suppression en cours...';status.classList.remove('error');try{const response=await fetch('/api/manage-content',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,collection,filePath,confirm:answer})});const data=await response.json();if(!response.ok)throw new Error(data.error||'Action impossible.');status.textContent=action==='archive'?'Contenu archivé.':'Contenu supprimé.';await loadItems()}catch(error){status.textContent=error.message;status.classList.add('error');button.disabled=false}}
    filters.forEach((button)=>button.addEventListener('click',()=>{activeFilter=button.dataset.filter;filters.forEach((item)=>item.classList.toggle('is-active',item===button));render()}));list.addEventListener('click',(event)=>{const button=event.target.closest('button[data-action]');if(button)runAction(button)});refresh.addEventListener('click',loadItems);loadItems();
  </script>
</body>
</html>
