<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Administration du blog MD Rénov'</title>
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f0ece4;
      --paper: #fffaf3;
      --ink: #171717;
      --muted: #68635c;
      --red: #9b1c1c;
      --line: #ded6ca;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 12% 8%, rgba(155, 28, 28, .10), transparent 28%),
        radial-gradient(circle at 88% 6%, rgba(23, 79, 49, .12), transparent 28%),
        var(--cream) !important;
      color: var(--ink);
      font-family: Lexend, system-ui, sans-serif !important;
    }

    body,
    input,
    textarea,
    select,
    button {
      font-family: Lexend, system-ui, sans-serif !important;
    }

    .mdr-admin-shortcuts {
      position: fixed;
      z-index: 9999;
      right: 18px;
      bottom: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding: 10px;
      border: 1px solid rgba(222, 214, 202, .8);
      border-radius: 999px;
      background: rgba(255, 250, 243, .86);
      box-shadow: 0 18px 44px rgba(23, 23, 23, .18);
      backdrop-filter: blur(16px);
    }

    .mdr-admin-shortcuts a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      color: #fff;
      font: 800 13px Lexend, Arial, sans-serif;
      text-decoration: none;
      white-space: nowrap;
    }

    .mdr-admin-shortcuts a:nth-child(1) { background: #171717; }
    .mdr-admin-shortcuts a:nth-child(2) { background: var(--red); }
    .mdr-admin-shortcuts a:nth-child(3) {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    body::before {
      content: "Backoffice MD Rénov'";
      position: fixed;
      z-index: 9998;
      left: 20px;
      bottom: 22px;
      color: var(--red);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .16em;
      text-transform: uppercase;
      pointer-events: none;
    }

    [class*="AppHeader"],
    [class*="SidebarContainer"],
    [class*="CollectionTopContainer"],
    [class*="EditorContainer"],
    [class*="ControlPaneContainer"] {
      font-family: Lexend, system-ui, sans-serif !important;
    }

    [class*="AppHeader"] {
      border-bottom: 1px solid var(--line) !important;
      background: rgba(255, 250, 243, .92) !important;
      box-shadow: 0 12px 34px rgba(23, 23, 23, .06) !important;
    }

    [class*="SidebarContainer"] {
      background: #171717 !important;
    }

    [class*="CollectionTopContainer"],
    [class*="EditorContainer"] {
      background: transparent !important;
    }

    input,
    textarea {
      border-radius: 14px !important;
    }

    @media (max-width: 720px) {
      .mdr-admin-shortcuts {
        left: 12px;
        right: 12px;
        border-radius: 22px;
      }

      body::before { display: none; }
    }
  </style>
</head>
<body>
  <div class="mdr-admin-shortcuts" aria-label="Raccourcis backoffice">
    <a href="./manage.html">Gérer</a>
    <a href="./brief.html">Brief article</a>
    <a href="../">Voir le blog</a>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
